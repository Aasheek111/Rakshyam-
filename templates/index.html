<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rakshyam Door Control</title>
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<style>

:root {
  --bg:        #f7f6f3;
  --ink:       #0e0e0e;
  --surface:   #ffffff;
  --surface2:  #f0ede8;
  --border:    #e5e2dc;
  --border-strong: #ccc9c2;
  --accent:    #c8a96e;
  --accent-dark: #a8874e;
  --green:     #239e2f;
  --red:       #c0392b;
  --text:      #0e0e0e;
  --muted:     #77716a;
  --mono:      'DM Sans', sans-serif;
  --sans:      'DM Sans', sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 28px 24px;
  background-image:
    linear-gradient(rgba(200,169,110,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,169,110,0.06) 1px, transparent 1px);
  background-size: 42px 42px;
}

.container {
  max-width: 1360px;
  margin: auto;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding: 20px 22px;
  background: var(--ink);
  border: 1px solid rgba(200,169,110,0.18);
  border-radius: 8px;
  box-shadow: 0 16px 40px rgba(14,14,14,0.08);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-icon svg { width: 18px; height: 18px; color: #fff; }

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 500;
  color: #fff;
  letter-spacing: 0;
}

.header p {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  margin-top: 2px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  background: rgba(35,158,47,0.12);
  border: 1px solid rgba(35,158,47,0.25);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  font-family: var(--sans);
  font-weight: 600;
  color: var(--green);
}

.live-dot {
  width: 7px;
  height: 7px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.8); }
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 20px;
}

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  overflow: hidden;
  box-shadow: 0 14px 34px rgba(14,14,14,0.06);
}

.card-title {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title::before {
  content: '';
  width: 3px;
  height: 14px;
  background: var(--accent);
  border-radius: 2px;
}

/* ── Video feed ── */
.video-wrap {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: #111;
  aspect-ratio: 16/9;
}

.video-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.video-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* corner brackets */
.corner {
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: var(--accent);
  border-style: solid;
  opacity: 0.6;
}
.corner-tl { top:10px; left:10px;  border-width:2px 0 0 2px; }
.corner-tr { top:10px; right:10px; border-width:2px 2px 0 0; }
.corner-bl { bottom:10px; left:10px;  border-width:0 0 2px 2px; }
.corner-br { bottom:10px; right:10px; border-width:0 2px 2px 0; }

.video-label {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--sans);
  font-weight: 600;
  font-size: 10px;
  color: var(--accent);
  opacity: 0.7;
  letter-spacing: .12em;
}

/* ── Status bar ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  margin-top: 16px;
}

.status-label {
  font-size: 12px;
  color: var(--muted);
  font-family: var(--sans);
  font-weight: 600;
  letter-spacing: .06em;
}

.status-value {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  transition: color .3s;
}

.status-value.open  { color: var(--green); }
.status-value.closed { color: var(--red); }

.status-indicator {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  transition: background .3s;
}

.status-indicator.open  { background: var(--green); box-shadow: 0 0 8px var(--green); }
.status-indicator.closed { background: var(--red);   box-shadow: 0 0 8px var(--red); }

/* ── Buttons ── */
.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}

.btn {
  padding: 14px;
  border: none;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: transform .15s, opacity .15s, box-shadow .15s;
  letter-spacing: .04em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn:hover   { transform: translateY(-2px); opacity: .92; }
.btn:active  { transform: scale(.98); }

.btn-open {
  background: var(--ink);
  color: #fff;
  box-shadow: 0 4px 18px rgba(14,14,14,0.15);
}

.btn-close {
  background: var(--red);
  color: #fff;
  box-shadow: 0 4px 18px rgba(192,57,43,0.18);
}

/* ── Right column ── */
.right-col {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Stats ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
}

.stat-val {
  font-family: var(--sans);
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
}

.stat-lbl {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

/* ── Chat ── */
.chat-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 280px;
  scroll-behavior: smooth;
}

.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg {
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 90%;
  word-break: break-word;
  animation: fadeUp .2s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}

.msg-system {
  background: #fff;
  border: 1px solid var(--border);
  color: var(--text);
  align-self: flex-start;
}

.msg-user {
  background: var(--ink);
  border: 1px solid var(--ink);
  color: #fff;
  align-self: flex-end;
}

.msg-time {
  font-size: 10px;
  color: var(--muted);
  margin-top: 3px;
  font-family: var(--sans);
  font-weight: 600;
}

.msg-user .msg-time { color: rgba(255,255,255,0.58); }

.chat-input-row {
  display: flex;
  gap: 8px;
}

.chat-input {
  flex: 1;
  padding: 11px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}

.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--muted); }

.btn-send {
  padding: 11px 18px;
  background: var(--accent);
  color: var(--ink);
  border: none;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  letter-spacing: .04em;
  white-space: nowrap;
}

.btn-send:hover  { opacity: .85; }
.btn-send:active { transform: scale(.97); }

/* ── Log entries ── */
.log {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  max-height: 130px;
  overflow-y: auto;
}

.log::-webkit-scrollbar { width: 3px; }
.log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.log-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  animation: fadeUp .2s ease;
}

.log-entry:last-child { border-bottom: none; }

.log-time {
  font-family: var(--sans);
  font-weight: 600;
  color: var(--muted);
  font-size: 10px;
  white-space: nowrap;
}

.log-text { color: var(--text); }

.log-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  .right-col { flex-direction: column; }
}

</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="14" cy="12" r="2"/>
          <path d="M3 12h9"/>
        </svg>
      </div>
      <div>
        <h1>DOOR CONTROL</h1>
        <p>AI-Powered Security & Access System</p>
      </div>
    </div>
    <div class="live-badge">
      <span class="live-dot"></span>
      LIVE
    </div>
  </div>

  <!-- Main grid -->
  <div class="grid">

    <!-- Left: video + controls -->
    <div class="card">
      <div class="card-title">Live Video Feed</div>

      <div class="video-wrap">
        <img src="{{ url_for('video_feed') }}" alt="Live feed">
        <div class="video-overlay">
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          <span class="video-label">CAM-01 · ENTRANCE</span>
        </div>
      </div>

      <div class="status-bar">
        <span class="status-label">DOOR STATUS</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="status-value closed" id="door-status-text">CLOSED</span>
          <span class="status-indicator closed" id="door-indicator"></span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-open" onclick="openDoor()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          OPEN
        </button>
        <button class="btn btn-close" onclick="closeDoor()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          CLOSE
        </button>
      </div>
    </div>

    <!-- Right column -->
    <div class="right-col">

      <!-- Stats -->
      <div class="card">
        <div class="card-title">System Stats</div>
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-val" id="stat-events">0</div>
            <div class="stat-lbl">Door Events</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-uptime">00:00</div>
            <div class="stat-lbl">Uptime</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-msgs">0</div>
            <div class="stat-lbl">Messages</div>
          </div>
          <div class="stat">
            <div class="stat-val" style="color:var(--green)">ON</div>
            <div class="stat-lbl">AI Status</div>
          </div>
        </div>
      </div>

      <!-- Activity log -->
      <div class="card">
        <div class="card-title">Activity Log</div>
        <div class="log" id="activity-log">
          <div class="log-entry">
            <span class="log-dot" style="background:var(--accent)"></span>
            <span class="log-time" id="init-time">--:--:--</span>
            <span class="log-text">System initialized</span>
          </div>
        </div>
      </div>

      <!-- Chat -->
      <div class="card chat-card">
        <div class="card-title">Live Chat</div>
        <div class="chat-messages" id="chat-box">
          <div class="msg msg-system">
            Welcome to the smart security system. How can I help?
            <div class="msg-time">System</div>
          </div>
        </div>
        <div class="chat-input-row">
          <input
            class="chat-input"
            type="text"
            id="chat-message"
            placeholder="Type a message..."
            autocomplete="off"
          >
          <button class="btn-send" onclick="sendMessage()">SEND</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const USERNAME = {{ username|tojson }};
  const socket = window.io ? io() : null;

  let doorEvents = 0;
  let messageCount = 0;
  let startTime = Date.now();

  // ── Uptime counter ──
  setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60);
    const h = Math.floor(m / 60);
    document.getElementById("stat-uptime").textContent =
      h > 0
        ? `${String(h).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }, 1000);

  // ── Set init time ──
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById("init-time").textContent = nowTime();
    addLog("System ready", "var(--accent)");
  });

  if (socket) {
    socket.on("message", data => {
      appendMessage(data.message, data.type === "user" ? "user" : "system", data.username || "System");
      messageCount++;
      document.getElementById("stat-msgs").textContent = messageCount;
    });

    socket.on("door-event", data => {
      if (data.status === "open") {
        setDoorStatus(true);
        bumpDoorEvents();
        addLog(data.message || "Door opened", "var(--green)");
      } else if (data.status === "closed") {
        setDoorStatus(false);
        bumpDoorEvents();
        addLog(data.message || "Door closed", "var(--red)");
      } else {
        addLog(data.message || "Door action failed", "var(--red)");
      }
    });

    socket.on("security-alert", data => {
      addLog(data.message || "Security alert", "var(--red)");
    });

    socket.on("attendance-event", data => {
      const color = data.Status === "Known" ? "var(--green)" : "var(--red)";
      addLog(`${data.Name} marked ${data.Status}`, color);
    });
  }

  function nowTime() {
    return new Date().toLocaleTimeString('en-US', { hour12: false });
  }

  // ── Door control ──
  function setDoorStatus(isOpen) {
    const text = document.getElementById("door-status-text");
    const dot  = document.getElementById("door-indicator");
    if (isOpen) {
      text.textContent = "OPEN";
      text.className = "status-value open";
      dot.className  = "status-indicator open";
    } else {
      text.textContent = "CLOSED";
      text.className = "status-value closed";
      dot.className  = "status-indicator closed";
    }
  }

  function bumpDoorEvents() {
    doorEvents++;
    document.getElementById("stat-events").textContent = doorEvents;
  }

  async function sendDoorRequest(url, isOpen, successText) {
    try {
      const response = await fetch(url);
      let data = {};
      try {
        data = await response.json();
      } catch (e) {
        data = {};
      }

      if (!response.ok || data.ok === false) {
        throw new Error(data.detail || data.status || "Request failed");
      }

      if (!socket || !socket.connected) {
        setDoorStatus(isOpen);
        bumpDoorEvents();
        addLog(successText, isOpen ? "var(--green)" : "var(--red)");
      }
    } catch (error) {
      addLog(`${successText} failed`, "var(--red)");
    }
  }

  function openDoor() {
    sendDoorRequest("/open_door", true, "Door opened");
  }

  function closeDoor() {
    sendDoorRequest("/close_door", false, "Door closed");
  }

  // ── Activity log ──
  function addLog(text, color) {
    const log = document.getElementById("activity-log");
    const entry = document.createElement("div");
    const dot = document.createElement("span");
    const time = document.createElement("span");
    const label = document.createElement("span");

    entry.className = "log-entry";
    dot.className = "log-dot";
    dot.style.background = color;
    time.className = "log-time";
    time.textContent = nowTime();
    label.className = "log-text";
    label.textContent = text;

    entry.appendChild(dot);
    entry.appendChild(time);
    entry.appendChild(label);
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
  }

  // ── Chat ──
  function sendMessage() {
    const input = document.getElementById("chat-message");
    const msg   = input.value.trim();
    if (!msg) return;

    input.value = "";
    if (socket && socket.connected) {
      socket.emit("user-message", { message: msg, username: USERNAME });
    } else {
      appendMessage(msg, "user", "You");
      messageCount++;
      document.getElementById("stat-msgs").textContent = messageCount;
    }
    addLog(`Message: "${msg.slice(0,30)}${msg.length>30?'...':''}"`, "var(--accent)");
  }

  function appendMessage(text, type, sender) {
    const box = document.getElementById("chat-box");
    const div = document.createElement("div");
    const meta = document.createElement("div");

    div.className = type === "user" ? "msg msg-user" : "msg msg-system";
    div.appendChild(document.createTextNode(text));
    meta.className = "msg-time";
    meta.textContent = `${sender || (type === "user" ? "You" : "System")} - ${nowTime()}`;
    div.appendChild(meta);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  // Enter key to send
  document.getElementById("chat-message").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
