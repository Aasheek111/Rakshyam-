<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Door Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --bg:        #080c12;
  --surface:   #0e1520;
  --surface2:  #141d2b;
  --border:    rgba(255,255,255,0.07);
  --accent:    #00e5ff;
  --green:     #00e676;
  --red:       #ff1744;
  --text:      #e2e8f0;
  --muted:     #4a5a70;
  --mono:      'Space Mono', monospace;
  --sans:      'DM Sans', sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 28px 24px;
  background-image:
    radial-gradient(ellipse 60% 40% at 70% 0%, rgba(0,229,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(0,230,118,0.04) 0%, transparent 50%);
}

.container {
  max-width: 1360px;
  margin: auto;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 38px;
  height: 38px;
  border: 2px solid var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-icon svg { width: 18px; height: 18px; color: var(--accent); }

.header h1 {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}

.header p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  background: rgba(0,230,118,0.1);
  border: 1px solid rgba(0,230,118,0.2);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  font-family: var(--mono);
  color: var(--green);
}

.live-dot {
  width: 7px;
  height: 7px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.5; transform: scale(0.8); }
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 20px;
}

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px;
  overflow: hidden;
}

.card-title {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title::before {
  content: '';
  width: 3px;
  height: 14px;
  background: var(--accent);
  border-radius: 2px;
}

/* ── Video feed ── */
.video-wrap {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  background: var(--surface2);
  aspect-ratio: 16/9;
}

.video-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.video-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* corner brackets */
.corner {
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: var(--accent);
  border-style: solid;
  opacity: 0.6;
}
.corner-tl { top:10px; left:10px;  border-width:2px 0 0 2px; }
.corner-tr { top:10px; right:10px; border-width:2px 2px 0 0; }
.corner-bl { bottom:10px; left:10px;  border-width:0 0 2px 2px; }
.corner-br { bottom:10px; right:10px; border-width:0 2px 2px 0; }

.video-label {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  opacity: 0.7;
  letter-spacing: .12em;
}

/* ── Status bar ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  margin-top: 16px;
}

.status-label {
  font-size: 12px;
  color: var(--muted);
  font-family: var(--mono);
  letter-spacing: .06em;
}

.status-value {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
  transition: color .3s;
}

.status-value.open  { color: var(--green); }
.status-value.closed { color: var(--red); }

.status-indicator {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  transition: background .3s;
}

.status-indicator.open  { background: var(--green); box-shadow: 0 0 8px var(--green); }
.status-indicator.closed { background: var(--red);   box-shadow: 0 0 8px var(--red); }

/* ── Buttons ── */
.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}

.btn {
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: transform .15s, opacity .15s, box-shadow .15s;
  letter-spacing: .04em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn:hover   { transform: translateY(-2px); opacity: .92; }
.btn:active  { transform: scale(.98); }

.btn-open {
  background: var(--green);
  color: #000;
  box-shadow: 0 4px 20px rgba(0,230,118,0.25);
}

.btn-close {
  background: var(--red);
  color: #fff;
  box-shadow: 0 4px 20px rgba(255,23,68,0.25);
}

/* ── Right column ── */
.right-col {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Stats ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
}

.stat-val {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
}

.stat-lbl {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

/* ── Chat ── */
.chat-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 280px;
  scroll-behavior: smooth;
}

.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg {
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 90%;
  word-break: break-word;
  animation: fadeUp .2s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}

.msg-system {
  background: rgba(0,229,255,0.08);
  border: 1px solid rgba(0,229,255,0.12);
  color: var(--text);
  align-self: flex-start;
}

.msg-user {
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border);
  color: var(--text);
  align-self: flex-end;
}

.msg-time {
  font-size: 10px;
  color: var(--muted);
  margin-top: 3px;
  font-family: var(--mono);
}

.chat-input-row {
  display: flex;
  gap: 8px;
}

.chat-input {
  flex: 1;
  padding: 11px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}

.chat-input:focus { border-color: rgba(0,229,255,0.4); }
.chat-input::placeholder { color: var(--muted); }

.btn-send {
  padding: 11px 18px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  letter-spacing: .04em;
  white-space: nowrap;
}

.btn-send:hover  { opacity: .85; }
.btn-send:active { transform: scale(.97); }

/* ── Log entries ── */
.log {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  max-height: 130px;
  overflow-y: auto;
}

.log::-webkit-scrollbar { width: 3px; }
.log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.log-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  animation: fadeUp .2s ease;
}

.log-entry:last-child { border-bottom: none; }

.log-time {
  font-family: var(--mono);
  color: var(--muted);
  font-size: 10px;
  white-space: nowrap;
}

.log-text { color: var(--text); }

.log-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
  .right-col { flex-direction: column; }
}

</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="14" cy="12" r="2"/>
          <path d="M3 12h9"/>
        </svg>
      </div>
      <div>
        <h1>DOOR CONTROL</h1>
        <p>AI-Powered Security & Access System</p>
      </div>
    </div>
    <div class="live-badge">
      <span class="live-dot"></span>
      LIVE
    </div>
  </div>

  <!-- Main grid -->
  <div class="grid">

    <!-- Left: video + controls -->
    <div class="card">
      <div class="card-title">Live Video Feed</div>

      <div class="video-wrap">
        <img src="{{ url_for('video_feed') }}" alt="Live feed">
        <div class="video-overlay">
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          <span class="video-label">CAM-01 · ENTRANCE</span>
        </div>
      </div>

      <div class="status-bar">
        <span class="status-label">DOOR STATUS</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="status-value closed" id="door-status-text">CLOSED</span>
          <span class="status-indicator closed" id="door-indicator"></span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-open" onclick="openDoor()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          OPEN
        </button>
        <button class="btn btn-close" onclick="closeDoor()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          CLOSE
        </button>
      </div>
    </div>

    <!-- Right column -->
    <div class="right-col">

      <!-- Stats -->
      <div class="card">
        <div class="card-title">System Stats</div>
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-val" id="stat-events">0</div>
            <div class="stat-lbl">Door Events</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-uptime">00:00</div>
            <div class="stat-lbl">Uptime</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-msgs">0</div>
            <div class="stat-lbl">Messages</div>
          </div>
          <div class="stat">
            <div class="stat-val" style="color:var(--green)">ON</div>
            <div class="stat-lbl">AI Status</div>
          </div>
        </div>
      </div>

      <!-- Activity log -->
      <div class="card">
        <div class="card-title">Activity Log</div>
        <div class="log" id="activity-log">
          <div class="log-entry">
            <span class="log-dot" style="background:var(--accent)"></span>
            <span class="log-time" id="init-time">--:--:--</span>
            <span class="log-text">System initialized</span>
          </div>
        </div>
      </div>

      <!-- Chat -->
      <div class="card chat-card">
        <div class="card-title">Live Chat</div>
        <div class="chat-messages" id="chat-box">
          <div class="msg msg-system">
            Welcome to the smart security system. How can I help?
            <div class="msg-time">System</div>
          </div>
        </div>
        <div class="chat-input-row">
          <input
            class="chat-input"
            type="text"
            id="chat-message"
            placeholder="Type a message..."
            autocomplete="off"
          >
          <button class="btn-send" onclick="sendMessage()">SEND</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const DOOR_IP = "http://192.168.1.108";

  let doorEvents = 0;
  let messageCount = 0;
  let startTime = Date.now();

  // ── Uptime counter ──
  setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(s / 60);
    const h = Math.floor(m / 60);
    document.getElementById("stat-uptime").textContent =
      h > 0
        ? `${String(h).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`
        : `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }, 1000);

  // ── Set init time ──
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById("init-time").textContent = nowTime();
    closeDoor();
  });

  function nowTime() {
    return new Date().toLocaleTimeString('en-US', { hour12: false });
  }

  // ── Door control ──
  function setDoorStatus(isOpen) {
    const text = document.getElementById("door-status-text");
    const dot  = document.getElementById("door-indicator");
    if (isOpen) {
      text.textContent = "OPEN";
      text.className = "status-value open";
      dot.className  = "status-indicator open";
    } else {
      text.textContent = "CLOSED";
      text.className = "status-value closed";
      dot.className  = "status-indicator closed";
    }
  }

  function openDoor() {
    new Image().src = DOOR_IP + "/open";
    setDoorStatus(true);
    doorEvents++;
    document.getElementById("stat-events").textContent = doorEvents;
    addLog("Door opened", "var(--green)");
  }

  function closeDoor() {
    new Image().src = DOOR_IP + "/close";
    setDoorStatus(false);
    doorEvents++;
    document.getElementById("stat-events").textContent = doorEvents;
    addLog("Door closed", "var(--red)");
  }

  // ── Activity log ──
  function addLog(text, color) {
    const log = document.getElementById("activity-log");
    const entry = document.createElement("div");
    entry.className = "log-entry";
    entry.innerHTML = `
      <span class="log-dot" style="background:${color}"></span>
      <span class="log-time">${nowTime()}</span>
      <span class="log-text">${text}</span>
    `;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
  }

  // ── Chat ──
  function sendMessage() {
    const input = document.getElementById("chat-message");
    const msg   = input.value.trim();
    if (!msg) return;

    appendMessage(msg, "user");
    input.value = "";
    messageCount++;
    document.getElementById("stat-msgs").textContent = messageCount;
    addLog(`Message: "${msg.slice(0,30)}${msg.length>30?'…':''}"`, "var(--accent)");
  }

  function appendMessage(text, type) {
    const box = document.getElementById("chat-box");
    const div = document.createElement("div");
    div.className = type === "user" ? "msg msg-user" : "msg msg-system";
    div.innerHTML = `${text}<div class="msg-time">${type === "user" ? "You" : "System"} · ${nowTime()}</div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  // Enter key to send
  document.getElementById("chat-message").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
