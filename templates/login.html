<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-dot {
      width: 24px;
      height: 24px;
      background: #111;
      border-radius: 6px;
    }

    .brand-name {
      font-size: 15px;
      font-weight: 600;
      color: #111;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      color: #111;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 13px;
      font-family: inherit;
      font-size: 14px;
      color: #111;
      background: #fafafa;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .field input:focus {
      border-color: #999;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
      background: #fff;
    }

    .field input::placeholder { color: #bbb; }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .forgot {
      font-size: 12px;
      color: #888;
      text-decoration: none;
    }

    .forgot:hover { color: #111; }

    .btn {
      width: 100%;
      padding: 12px;
      background: #111;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s, transform .1s;
      margin-top: 6px;
    }

    .btn:hover { background: #222; }
    .btn:active { transform: scale(0.99); }

    .footer {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-top: 20px;
    }

    .footer a {
      color: #111;
      font-weight: 500;
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    .flash {
      background: #fff5f5;
      border: 1px solid #fcc;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 13px;
      color: #c0392b;
      margin-top: 16px;
      text-align: center;
    }

  </style>
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-name">YourApp</span>
  </div>

  <h2>Welcome Home !</h2>
  <p class="sub">Sign in to your account to continue.</p>

  <form method="POST" novalidate>

    <div class="field">
      <label for="username">Email address</label>
      <input type="email" id="username" name="username" placeholder="you@example.com" autocomplete="email" required>
    </div>

    <div class="field">
      <div class="field-row">
        <label for="password" style="margin:0">Password</label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <button type="submit" class="btn">Sign in</button>

  </form>

  <p class="footer">Don't have an account? <a href="#">Sign up</a></p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

</div>

</body>
</html>
